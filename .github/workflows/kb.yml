name: Build + KbdHook

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2085767"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet /norestart" -Wait
      shell: powershell

    - name: Build USB KM Driver
      run: |
        msbuild src/AmtPtpDeviceUsbKm/AmtPtpDeviceUsbKm.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0.26100.0
      shell: powershell

    - name: Find WDK tools path
      run: |
        $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
          Where-Object { $_.FullName -match "x64" } | Sort-Object FullName -Descending | Select-Object -First 1
        $inf2cat = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "inf2cat.exe" |
          Sort-Object FullName -Descending | Select-Object -First 1
        if (-not $signtool) { throw "signtool.exe not found" }
        if (-not $inf2cat)  { throw "inf2cat.exe not found" }
        Add-Content $env:GITHUB_ENV "SIGNTOOL=$($signtool.FullName)"
        Add-Content $env:GITHUB_ENV "INF2CAT=$($inf2cat.FullName)"
      shell: powershell

    - name: Generate test certificate
      run: |
        $cert = New-SelfSignedCertificate `
          -Type CodeSigningCert `
          -Subject "CN=AmtPtpKbdHookTestCert" `
          -CertStoreLocation "Cert:\LocalMachine\My" `
          -NotAfter (Get-Date).AddYears(3)
        $cerPath = "$env:TEMP\AmtPtpKbdHookTestCert.cer"
        Export-Certificate -Cert $cert -FilePath $cerPath -Type CERT | Out-Null
        Add-Content $env:GITHUB_ENV "KBDHOOK_CERT_THUMBPRINT=$($cert.Thumbprint)"
        Add-Content $env:GITHUB_ENV "KBDHOOK_CERT_PATH=$cerPath"
      shell: powershell

    - name: Build Keyboard Filter Driver
      run: |
        msbuild src/AmtPtpDeviceUsbKm/AmtPtpKbdHook.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0.26100.0
      shell: powershell

    - name: Generate INF for KbdHook
      run: |
        $buildDir = "src/AmtPtpDeviceUsbKm/build/AmtPtpKbdHook/x64/Release"
        $pkgDir = "$buildDir/Package"
        New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
        $driverVer = (Get-Date -Format "MM/dd/yyyy") + ",1.0.0.0"
        $lines = @(
          "; AmtPtpKbdHook.inf - Keyboard filter driver",
          "[Version]",
          'Signature="$WINDOWS NT$"',
          "Class=Keyboard",
          "ClassGuid={4D36E96B-E325-11CE-BFC1-08002BE10318}",
          "Provider=%ManufacturerName%",
          "CatalogFile=AmtPtpKbdHook.cat",
          "DriverVer=$driverVer",
          "",
          "[DestinationDirs]",
          "DefaultDestDir = 12",
          "",
          "[Manufacturer]",
          "%ManufacturerName% = Standard,NTamd64",
          "",
          "[Standard.NTamd64]",
          "%KbdDeviceDesc% = KbdHook_Install, *PNP0303",
          "%KbdDeviceDesc% = KbdHook_Install, HID_DEVICE_SYSTEM_KEYBOARD",
          "",
          "[KbdHook_Install]",
          "CopyFiles = KbdHook_Files",
          "",
          "[KbdHook_Install.HW]",
          "AddReg = KbdHook_AddReg",
          "",
          "[KbdHook_AddReg]",
          'HKR,,"UpperFilters",0x00010000,"AmtPtpKbdHook"',
          "",
          "[KbdHook_Install.Services]",
          "AddService = AmtPtpKbdHook,0x00000002,KbdHook_Service",
          "",
          "[KbdHook_Service]",
          "DisplayName = %KbdFilterServiceDesc%",
          "ServiceType = 1",
          "StartType = 3",
          "ErrorControl = 1",
          "ServiceBinary = %12%\AmtPtpKbdHook.sys",
          "",
          "[KbdHook_Files]",
          "AmtPtpKbdHook.sys",
          "",
          "[SourceDisksFiles]",
          "AmtPtpKbdHook.sys = 1,,",
          "",
          "[SourceDisksNames]",
          '1 = %DiskName%,,,""',
          "",
          "[Strings]",
          'ManufacturerName = "Apple MacBook PTP"',
          'KbdDeviceDesc = "Apple MacBook Keyboard Filter Driver"',
          'KbdFilterServiceDesc = "AmtPtp KBD Hook Service"',
          'DiskName = "AmtPtpKbdHook Installation Disk"'
        )
        Set-Content -Path "$pkgDir\AmtPtpKbdHook.inf" -Value $lines -Encoding ASCII
        Add-Content $env:GITHUB_ENV "KBDHOOK_PKG_DIR=$pkgDir"
        Add-Content $env:GITHUB_ENV "KBDHOOK_BUILD_DIR=$buildDir"
      shell: powershell

    - name: Sign SYS and CAT for KbdHook
      run: |
        Copy-Item "$env:KBDHOOK_BUILD_DIR\AmtPtpKbdHook.sys" "$env:KBDHOOK_PKG_DIR\AmtPtpKbdHook.sys"
        & "$env:SIGNTOOL" sign /fd sha256 /sha1 "$env:KBDHOOK_CERT_THUMBPRINT" `
          /tr http://timestamp.digicert.com /td sha256 "$env:KBDHOOK_PKG_DIR\AmtPtpKbdHook.sys"
        if ($LASTEXITCODE -ne 0) { throw "Signing .sys failed" }
        $pkgAbs = (Resolve-Path $env:KBDHOOK_PKG_DIR).Path
        & "$env:INF2CAT" /driver:"$pkgAbs" /os:10_X64 /uselocaltime
        if ($LASTEXITCODE -ne 0) { throw "inf2cat failed" }
        & "$env:SIGNTOOL" sign /fd sha256 /sha1 "$env:KBDHOOK_CERT_THUMBPRINT" `
          /tr http://timestamp.digicert.com /td sha256 "$env:KBDHOOK_PKG_DIR\AmtPtpKbdHook.cat"
        if ($LASTEXITCODE -ne 0) { throw "Signing .cat failed" }
        Copy-Item "$env:KBDHOOK_CERT_PATH" "$env:KBDHOOK_PKG_DIR\AmtPtpKbdHookTestCert.cer"
        Get-ChildItem $env:KBDHOOK_PKG_DIR | Select-Object Name
      shell: powershell

    - name: Upload USB KM Driver artifact
      uses: actions/upload-artifact@v4
      with:
        name: AmtPtpDeviceUsbKm-Release-x64
        path: |
          src/AmtPtpDeviceUsbKm/build/AmtPtpDeviceUsbKm/x64/Release/*.sys
          src/AmtPtpDeviceUsbKm/build/AmtPtpDeviceUsbKm/x64/Release/*.inf
          src/AmtPtpDeviceUsbKm/build/AmtPtpDeviceUsbKm/x64/Release/*.cat

    - name: Upload Keyboard Filter Driver artifact
      uses: actions/upload-artifact@v4
      with:
        name: AmtPtpKbdHook-Release-x64
        path: src/AmtPtpDeviceUsbKm/build/AmtPtpKbdHook/x64/Release/Package/

    - name: Upload all drivers (combined)
      uses: actions/upload-artifact@v4
      with:
        name: AmtPtp-AllDrivers-Release-x64
        path: src/**/build/**/x64/Release/*.*
