name: Build Driver

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK via winget
      run: |
        $wdkUrl = "https://go.microsoft.com/fwlink/?linkid=2196230"
        $wdkInstaller = "$env:TEMP\wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile $wdkInstaller
        Start-Process -FilePath $wdkInstaller -ArgumentList "/quiet /norestart" -Wait
      shell: powershell

    - name: Build SPI Driver
      run: msbuild src/AmtPtpDeviceSpiKm/AmtPtpDeviceSpiKm.vcxproj /p:Configuration=Release /p:Platform=x64
      shell: powershell

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AmtPtpDeviceSpiKm-Release-x64
        path: |
          src/AmtPtpDeviceSpiKm/x64/Release/*.sys
          src/AmtPtpDeviceSpiKm/x64/Release/*.inf
          src/AmtPtpDeviceSpiKm/x64/Release/*.cat
