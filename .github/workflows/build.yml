name: Build Driver

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK via NuGet
      run: |
        nuget install Microsoft.Windows.WDK.x64 -Version 10.0.26100.3 -OutputDirectory C:\wdk
        nuget install Microsoft.Windows.SDK.CPP -Version 10.0.26100.3 -OutputDirectory C:\wdk
        nuget install Microsoft.Windows.SDK.CPP.x64 -Version 10.0.26100.3 -OutputDirectory C:\wdk
      shell: powershell

    - name: Build SPI Driver
      run: |
        $sdkInc = "C:\wdk\Microsoft.Windows.SDK.CPP.10.0.26100.3\c\Include\10.0.26100.0"
        $sdkLib = "C:\wdk\Microsoft.Windows.SDK.CPP.x64.10.0.26100.3\c\Lib\10.0.26100.0"
        $wdkInc = "C:\wdk\Microsoft.Windows.WDK.x64.10.0.26100.3\c\Include\10.0.26100.0"
        $wdkLib = "C:\wdk\Microsoft.Windows.WDK.x64.10.0.26100.3\c\Lib\10.0.26100.0"

        msbuild src/AmtPtpDeviceSpiKm/AmtPtpDeviceSpiKm.vcxproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:WindowsTargetPlatformVersion=10.0.26100.0 `
          /p:IncludePath="$wdkInc\km;$sdkInc\shared;$sdkInc\km;$(IncludePath)" `
          /p:LibraryPath="$wdkLib\km\x64;$sdkLib\km\x64;$(LibraryPath)"
      shell: powershell

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AmtPtpDeviceSpiKm-Release-x64
        path: |
          src/AmtPtpDeviceSpiKm/x64/Release/*.sys
          src/AmtPtpDeviceSpiKm/x64/Release/*.inf
          src/AmtPtpDeviceSpiKm/x64/Release/*.cat
